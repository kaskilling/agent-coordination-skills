name: Check peer-deliberation routing

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout collection
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Require a dedicated OpenAI API key
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::Configure the OPENAI_API_KEY repository secret before running this workflow."
            exit 1
          fi

      - name: Run causal instruction check
        id: cib
        uses: kalibraring/conditional-instruction-benchmark@eebdbfc84206c594db2d61cf883325e2d8e1b07d # v0.5.1
        with:
          config: cib.yaml
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          artifact-name: peer-deliberation-routing

      - name: Show safe report location
        run: |
          echo "Report artifact path: ${{ steps.cib.outputs.report-path }}"
